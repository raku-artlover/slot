<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>文章スロット</title>

<style>
body{
    margin:0;
    background:#222;
    color:white;
    font-family:sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

#machine{
    text-align:center;
}

#slots{
    display:flex;
    gap:25px;
    justify-content:center;
    margin-bottom:30px;
}

.reel{
    width:280px;
    height:90px;
    border:8px solid #999;
    border-radius:15px;
    background:white;
    color:black;
    font-size:42px;
    font-weight:bold;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}

#message{
    font-size:24px;
    color:#ddd;
}
</style>

</head>
<body>

<div id="machine">

<div id="slots">
<div class="reel" id="left">Press Space</div>
<div class="reel" id="right">Press Space</div>
</div>

<div id="message">
スペース：開始 → 左停止 → 右停止 → リセット
</div>

</div>

<script>

//========================
// 作りたい文章
// 左側と右側を対応させる
//========================

const sentences = [

["私は","学生です"],
["私は","天才です"],
["猫は","かわいい"],
["今日は","休みです"],
["君は","最高だ"],
["人生は","面白い"],
["芸術は","自由だ"],
["音楽は","世界を変える"]

];

//========================

const leftReel=document.getElementById("left");
const rightReel=document.getElementById("right");

let state=0;
//0 待機
//1 回転中
//2 左停止
//3 全停止

let leftIndex=0;
let rightIndex=0;

let leftTimer=null;
let rightTimer=null;

function randomIndex(){
    return Math.floor(Math.random()*sentences.length);
}

function start(){

    leftTimer=setInterval(()=>{
        leftIndex=randomIndex();
        leftReel.textContent=sentences[leftIndex][0];
    },70);

    rightTimer=setInterval(()=>{
        rightIndex=randomIndex();
        rightReel.textContent=sentences[rightIndex][1];
    },70);

}

function stopLeft(){

    clearInterval(leftTimer);

}

function stopRight(){

    clearInterval(rightTimer);

}

function reset(){

    leftReel.textContent="Press Space";
    rightReel.textContent="Press Space";

}

document.addEventListener("keydown",(e)=>{

    if(e.code!="Space") return;

    e.preventDefault();

    if(state==0){

        start();
        state=1;

    }

    else if(state==1){

        stopLeft();
        state=2;

    }

    else if(state==2){

        stopRight();
        state=3;

    }

    else{

        reset();
        state=0;

    }

});

</script>

</body>
</html>
